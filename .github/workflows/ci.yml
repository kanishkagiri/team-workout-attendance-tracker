name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Stage 1 - Clone Repository
        uses: actions/checkout@v4

      - name: Stage 2 - Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Stage 3 - Install Dependencies
        working-directory: ./backend
        run: npm install

      - name: Stage 4 - Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Stage 5 - Build and Push Backend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/workout-tracker-backend ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/workout-tracker-backend


  frontend:
    name: Frontend Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Stage 1 - Clone Repository
        uses: actions/checkout@v4

      - name: Stage 2 - Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Stage 3 - Install and Build
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Stage 4 - Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Stage 5 - Build and Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/workout-tracker-frontend ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/workout-tracker-frontend